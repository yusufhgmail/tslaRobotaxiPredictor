<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Past snapshots — Tesla Robotaxi Scaling Predictor</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<style>
  :root {
    color-scheme: dark;
    --bg: #000000;
    --panel: #0f0f0f;
    --border: #262626;
    --text: #ffffff;
    --muted: #a8a8a8;
    --accent: #e31937;
    --accent-2: #ff2d45;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: "Inter", "Helvetica Neue", Helvetica, Arial, -apple-system, "Segoe UI", system-ui, sans-serif;
    font-size: 15px; line-height: 1.55;
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  a { color: var(--accent); }
  .wrap { max-width: 1200px; margin: 0 auto; padding: 20px 24px 80px; }

  /* Tesla topbar */
  .topbar {
    display: flex; align-items: center; gap: 20px;
    padding: 14px 0 22px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 26px;
  }
  .brand { display: inline-flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text); }
  .brand .wordmark {
    font-weight: 700; font-size: 22px;
    letter-spacing: 0.55em; padding-left: 0.55em;
    text-transform: uppercase; color: var(--accent);
  }
  .brand .tag {
    font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase;
    color: var(--muted); font-weight: 500;
    border-left: 1px solid var(--border); padding-left: 12px; margin-left: 4px;
  }
  .topbar .spacer { flex: 1; }
  .topbar nav { display: flex; gap: 22px; align-items: center; }
  .topbar nav a {
    color: var(--text); text-decoration: none;
    font-size: 11px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase;
  }
  .topbar nav a:hover { color: var(--accent); }

  header.pagehead { margin-bottom: 22px; }
  header.pagehead h1 { font-size: 30px; font-weight: 500; margin: 0 0 6px; letter-spacing: -0.015em; }
  header.pagehead h1 .mark { color: var(--accent); font-weight: 700; }
  header.pagehead .sub { color: var(--muted); font-size: 13px; }

  .layout { display: grid; grid-template-columns: 260px 1fr; gap: 20px; }
  @media (max-width: 720px) { .layout { grid-template-columns: 1fr; } }

  .list { background: var(--panel); border: 1px solid var(--border); border-radius: 2px; padding: 8px; max-height: 640px; overflow: auto; }
  .list button { display: block; width: 100%; text-align: left; background: transparent; color: var(--text);
    border: 0; padding: 10px 12px; border-radius: 2px; cursor: pointer; font-size: 13px; font-family: inherit;
    transition: background 120ms ease; }
  .list button:hover { background: rgba(255,255,255,0.05); }
  .list button.on { background: var(--accent); color: #ffffff; font-weight: 600; }
  .list .date { font-variant-numeric: tabular-nums; font-weight: 500; }
  .list .sub { color: var(--muted); font-size: 11px; margin-top: 2px; }
  .list button.on .sub { color: #ffffff; opacity: 0.85; }

  #chart { background: var(--panel); border: 1px solid var(--border); border-radius: 2px; height: 560px; }
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1px; margin-top: 12px; background: var(--border); border: 1px solid var(--border); border-radius: 2px; overflow: hidden; }
  .card { background: var(--panel); padding: 12px 14px; border-radius: 0; }
  .card .lbl { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 0.18em; font-weight: 600; }
  .card .val { font-size: 20px; font-weight: 500; font-variant-numeric: tabular-nums; margin-top: 4px; letter-spacing: -0.01em; }
  .muted { color: var(--muted); font-size: 12px; }
  .empty { color: var(--muted); text-align: center; padding: 60px 0; }

  .site-footer {
    margin-top: 56px; padding: 32px 0 8px;
    border-top: 1px solid var(--border);
    display: flex; flex-direction: column; align-items: center; gap: 14px;
  }
  .site-footer .wordmark {
    font-weight: 700; font-size: 16px; color: var(--accent);
    letter-spacing: 0.6em; padding-left: 0.6em;
    text-transform: uppercase;
  }
  .site-footer .nom {
    color: var(--muted); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase;
  }
  @media (max-width: 640px) {
    .brand .tag { display: none; }
    header.pagehead h1 { font-size: 24px; }
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <a class="brand" href="./" aria-label="Tesla Robotaxi Predictor (independent tracker)">
      <span class="wordmark">TESLA</span>
      <span class="tag">Robotaxi Predictor</span>
    </a>
    <div class="spacer"></div>
    <nav>
      <a href="./">Dashboard</a>
      <a href="community.html">Community</a>
    </nav>
  </div>

  <header class="pagehead">
    <h1>Past <span class="mark">Snapshots</span></h1>
    <div class="sub">Pick a date from the list to see the forecast as it was then.</div>
  </header>

  <div class="layout">
    <div class="list" id="list"></div>
    <div>
      <div id="chart"></div>
      <div class="stats" id="stats"></div>
      <div class="muted" id="caption" style="margin-top:8px"></div>
    </div>
  </div>

  <footer class="site-footer">
    <span class="wordmark">TESLA</span>
    <span class="nom">Independent tracker · Not affiliated with Tesla, Inc.</span>
  </footer>
</div>

<script>
const INDEX_URL = 'data/snapshots/index.json';

async function loadIndex() {
  const r = await fetch(INDEX_URL + '?t=' + Date.now());
  if (!r.ok) throw new Error('Failed to load snapshot index');
  return r.json();
}

async function loadSnapshot(file) {
  const r = await fetch(file + '?t=' + Date.now());
  if (!r.ok) throw new Error('Failed to load snapshot');
  return r.json();
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

function render(snapshot) {
  const fx = snapshot.forecast_dates || [];
  const histX = (snapshot.historical || []).map(h => h.date);
  const histY = (snapshot.historical || []).map(h => h.value);

  const targets = snapshot.targets || [];
  const thresholdTraces = targets.map(t => ({
    x: [histX[0] || fx[0], fx[fx.length - 1] || histX[histX.length - 1]],
    y: [t.value, t.value],
    mode: 'lines',
    line: { color: t.color || '#facc15', width: 1.5, dash: 'dot' },
    name: `${t.label || 'Target'} (${Math.round(t.value).toLocaleString()})`,
    type: 'scatter',
  }));
  const bandOuter = {
    x: fx.concat(fx.slice().reverse()),
    y: (snapshot.p95 || []).concat((snapshot.p5 || []).slice().reverse()),
    fill: 'toself', fillcolor: 'rgba(227, 25, 55, 0.08)', line: { width: 0 },
    name: 'P5–P95', hoverinfo: 'skip', type: 'scatter',
  };
  const bandInner = {
    x: fx.concat(fx.slice().reverse()),
    y: (snapshot.p75 || []).concat((snapshot.p25 || []).slice().reverse()),
    fill: 'toself', fillcolor: 'rgba(227, 25, 55, 0.22)', line: { width: 0 },
    name: 'P25–P75', hoverinfo: 'skip', type: 'scatter',
  };
  const median = {
    x: fx, y: snapshot.p50 || [], mode: 'lines',
    line: { color: '#e31937', width: 2, dash: 'dash' }, name: 'Median', type: 'scatter',
  };
  const actual = {
    x: histX, y: histY, mode: 'lines+markers',
    line: { color: '#ffffff', width: 2.5 }, marker: { color: '#ffffff', size: 6 },
    name: 'Actual', type: 'scatter',
  };

  Plotly.newPlot('chart', [bandOuter, bandInner, median, ...thresholdTraces, actual], {
    paper_bgcolor: '#0f0f0f', plot_bgcolor: '#0f0f0f',
    font: { color: '#ffffff', family: 'Inter, "Helvetica Neue", Helvetica, Arial, sans-serif' },
    margin: { t: 24, r: 20, b: 40, l: 70 },
    xaxis: { gridcolor: '#262626' },
    yaxis: { gridcolor: '#262626', title: 'Unsupervised robotaxis', type: 'log' },
    legend: { orientation: 'h', y: -0.14, font: { size: 11 } },
    hovermode: 'x unified',
  }, { displaylogo: false, responsive: true });

  const fit = snapshot.fit || {};
  const etas = snapshot.eta_by_target || {};
  const latest = (snapshot.historical || [])[snapshot.historical.length - 1]?.value;
  const cards = [
    { lbl: 'Snapshot date', val: (snapshot.generated_at || '').slice(0, 10) || '—' },
    { lbl: 'Latest then', val: latest != null ? Math.round(latest) : '—' },
    { lbl: 'Weekly growth', val: ((fit.rate_weekly || 0) * 100).toFixed(1) + '%' },
    { lbl: 'P50 → 1,000', val: etas['1000']?.p50 || '—' },
    { lbl: 'P50 → 1,800', val: etas['1800']?.p50 || '—' },
  ];
  document.getElementById('stats').innerHTML = cards.map(c =>
    `<div class="card"><div class="lbl">${c.lbl}</div><div class="val">${c.val}</div></div>`
  ).join('');
  document.getElementById('caption').textContent = 'Generated ' + (snapshot.generated_at || '').replace('T', ' ').slice(0, 16) + ' UTC';
}

(async () => {
  const list = document.getElementById('list');
  let entries;
  try {
    entries = await loadIndex();
  } catch (e) {
    list.innerHTML = `<div class="muted" style="padding:12px">No snapshots yet — come back after the first weekly run.</div>`;
    document.getElementById('chart').innerHTML = '<div class="empty">No snapshots available.</div>';
    return;
  }
  if (!entries.length) {
    list.innerHTML = `<div class="muted" style="padding:12px">No snapshots yet.</div>`;
    document.getElementById('chart').innerHTML = '<div class="empty">No snapshots available.</div>';
    return;
  }
  const render_list = (activeDate) => {
    list.innerHTML = entries.map(e =>
      `<button data-file="${escapeHtml(e.file)}" data-date="${escapeHtml(e.date)}" class="${e.date === activeDate ? 'on' : ''}">
         <div class="date">${escapeHtml(e.date)}</div>
         <div class="sub">${e.latest != null ? e.latest + ' unsup' : '—'} · ${e.weekly_growth_pct != null ? e.weekly_growth_pct.toFixed(1) + '%/wk' : ''}</div>
       </button>`
    ).join('');
    list.querySelectorAll('button').forEach(btn => btn.addEventListener('click', async () => {
      try {
        const snap = await loadSnapshot(btn.dataset.file);
        render(snap);
        render_list(btn.dataset.date);
      } catch (e) {
        document.getElementById('chart').innerHTML = `<div class="empty">Error: ${escapeHtml(e.message)}</div>`;
      }
    }));
  };
  // Load the most recent by default.
  const first = entries[0];
  render_list(first.date);
  try {
    const snap = await loadSnapshot(first.file);
    render(snap);
  } catch (e) {
    document.getElementById('chart').innerHTML = `<div class="empty">Error loading snapshot.</div>`;
  }
})();
</script>
</body>
</html>
