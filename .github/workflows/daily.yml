name: Daily robotaxi update

on:
  schedule:
    # Every day at 13:00 UTC (~09:00 ET / 08:00 CT).
    - cron: "0 13 * * *"
  workflow_dispatch:
    inputs:
      manual:
        description: "Manual run (skip emails even if count changed)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write   # to commit updated data
  pages: write      # to publish
  id-token: write   # to publish via OIDC

concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Scrape latest snapshot
        run: python scripts/scrape.py

      - name: Fetch & score news
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        run: python scripts/news.py

      - name: Run forecast
        run: python scripts/forecast.py

      - name: Build site
        run: python scripts/build_site.py

      - name: Archive snapshot
        run: python scripts/archive_snapshot.py

      - name: Commit data + site changes
        run: |
          git config user.name "robotaxi-bot"
          git config user.email "robotaxi-bot@users.noreply.github.com"
          git add data/ docs/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily update $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

      - name: Send summary email to owner
        if: ${{ inputs.manual != true }}
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL: ${{ vars.NOTIFY_EMAIL }}
        run: python scripts/notify.py

      - name: Send newsletter to subscribers
        if: ${{ inputs.manual != true }}
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: python scripts/newsletter.py

      - name: Mark count as emailed
        if: ${{ inputs.manual != true }}
        run: python scripts/mark_emailed.py

      - name: Persist last_emailed state (if changed)
        if: ${{ inputs.manual != true }}
        run: |
          git config user.name "robotaxi-bot"
          git config user.email "robotaxi-bot@users.noreply.github.com"
          if [ -f data/last_emailed.json ]; then
            git add data/last_emailed.json
            if ! git diff --cached --quiet; then
              git commit -m "chore: record last_emailed $(date -u +%Y-%m-%d)"
              git push
            fi
          fi
